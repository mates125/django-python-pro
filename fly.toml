# fly.toml app configuration file generated for django-python-pro on 2026-03-19T02:05:54Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'django-python-pro'
primary_region = 'gru'
console_command = '/code/manage.py shell'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
